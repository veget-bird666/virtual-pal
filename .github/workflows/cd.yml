name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  DEPLOY_DIR: /opt/virtual-pal

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # ── 1. 构建镜像 & 推送到 Docker Hub ──
      - name: Build and push images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

          docker build -t $DOCKER_USERNAME/virtual-pal-backend:${{ github.sha }} ./backend
          docker tag $DOCKER_USERNAME/virtual-pal-backend:${{ github.sha }} $DOCKER_USERNAME/virtual-pal-backend:latest
          docker push $DOCKER_USERNAME/virtual-pal-backend:${{ github.sha }}
          docker push $DOCKER_USERNAME/virtual-pal-backend:latest

          docker build -t $DOCKER_USERNAME/virtual-pal-frontend:${{ github.sha }} ./frontend
          docker tag $DOCKER_USERNAME/virtual-pal-frontend:${{ github.sha }} $DOCKER_USERNAME/virtual-pal-frontend:latest
          docker push $DOCKER_USERNAME/virtual-pal-frontend:${{ github.sha }}
          docker push $DOCKER_USERNAME/virtual-pal-frontend:latest

      # ── 2. 服务器部署 ──
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            mkdir -p ${{ env.DEPLOY_DIR }}
            cd ${{ env.DEPLOY_DIR }}

            echo ">>> Writing docker-compose.yml..."
            cat > docker-compose.yml << 'COMPOSE'
services:
  frontend:
    image: ${{ secrets.DOCKER_USERNAME }}/virtual-pal-frontend:latest
    container_name: virtual-pal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${{ secrets.DOCKER_USERNAME }}/virtual-pal-backend:latest
    container_name: virtual-pal-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: virtual-pal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
COMPOSE

            echo ">>> Pulling latest images..."
            docker compose pull

            echo ">>> Starting services..."
            docker compose up -d

            echo ">>> Cleaning up..."
            docker image prune -f

      # ── 3. 健康检查 ──
      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.SERVER_HOST }}/api/v1/health
