name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  BACKEND_IMAGE: virtual-pal-backend
  FRONTEND_IMAGE: virtual-pal-frontend
  DEPLOY_DIR: /opt/virtual-pal

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # ── 1. 构建镜像 ──
      - name: Build Docker images
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

      # ── 2. 打包：压缩镜像 + 部署用 compose 文件 ──
      - name: Package images and config
        run: |
          mkdir -p deploy
          docker save ${{ env.BACKEND_IMAGE }}:${{ github.sha }} | gzip > deploy/backend.tar.gz
          docker save ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} | gzip > deploy/frontend.tar.gz
          cp docker-compose.deploy.yml deploy/docker-compose.yml

      # ── 3. 传送到服务器 ──
      - name: Copy files to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/id_deploy"
          cat deploy/backend.tar.gz | ssh $SSH_OPTS root@${{ secrets.SERVER_HOST }} "cat > ${{ env.DEPLOY_DIR }}/backend.tar.gz"
          cat deploy/frontend.tar.gz | ssh $SSH_OPTS root@${{ secrets.SERVER_HOST }} "cat > ${{ env.DEPLOY_DIR }}/frontend.tar.gz"
          cat deploy/docker-compose.yml | ssh $SSH_OPTS root@${{ secrets.SERVER_HOST }} "cat > ${{ env.DEPLOY_DIR }}/docker-compose.yml"

      # ── 4. 服务器部署 ──
      - name: Deploy on server
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/id_deploy"
          ssh $SSH_OPTS root@${{ secrets.SERVER_HOST }} bash -s << 'REMOTE'
            set -e
            cd ${{ env.DEPLOY_DIR }}

            echo ">>> Loading backend image..."
            docker load -i backend.tar.gz

            echo ">>> Loading frontend image..."
            docker load -i frontend.tar.gz

            echo ">>> Tagging images..."
            docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:latest
            docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest

            echo ">>> Starting services..."
            docker compose up -d

            echo ">>> Cleaning up old versions..."
            for img in ${{ env.BACKEND_IMAGE }} ${{ env.FRONTEND_IMAGE }}; do
              docker images "$img" --format "{{.Tag}}" \
                | grep -v latest \
                | sort -r \
                | tail -n +4 \
                | xargs -rI{} docker rmi "$img:{}" 2>/dev/null || true
            done

            echo ">>> Deploy complete!"
          REMOTE

      # ── 5. 健康检查 ──
      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.SERVER_HOST }}/api/v1/health
