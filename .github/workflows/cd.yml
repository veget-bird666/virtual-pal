name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  DEPLOY_DIR: /opt/virtual-pal

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # ── 1. 构建镜像 & 推送到 Docker Hub ──
      - name: Build and push images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

          docker build -t $DOCKER_USERNAME/virtual-pal-backend:${{ github.sha }} ./backend
          docker tag $DOCKER_USERNAME/virtual-pal-backend:${{ github.sha }} $DOCKER_USERNAME/virtual-pal-backend:latest
          docker push $DOCKER_USERNAME/virtual-pal-backend:${{ github.sha }}
          docker push $DOCKER_USERNAME/virtual-pal-backend:latest

          docker build -t $DOCKER_USERNAME/virtual-pal-frontend:${{ github.sha }} ./frontend
          docker tag $DOCKER_USERNAME/virtual-pal-frontend:${{ github.sha }} $DOCKER_USERNAME/virtual-pal-frontend:latest
          docker push $DOCKER_USERNAME/virtual-pal-frontend:${{ github.sha }}
          docker push $DOCKER_USERNAME/virtual-pal-frontend:latest

      # ── 2. 服务器部署 ──
      - name: Deploy on server
        run: |
          # 配置 SSH 密钥
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/id_deploy"
          SSH_DEST="root@${{ secrets.SERVER_HOST }}"

          # 创建部署目录
          ssh $SSH_OPTS $SSH_DEST "mkdir -p ${{ env.DEPLOY_DIR }}"

          # 替换 docker-compose.deploy.yml 中的用户名并传送到服务器
          sed 's|\${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g' docker-compose.deploy.yml | \
            ssh $SSH_OPTS $SSH_DEST "cat > ${{ env.DEPLOY_DIR }}/docker-compose.yml"

          # 拉取镜像并重启
          ssh $SSH_OPTS $SSH_DEST "cd ${{ env.DEPLOY_DIR }} && docker compose pull && docker compose up -d && docker image prune -f"

      # ── 3. 健康检查 ──
      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.SERVER_HOST }}/api/v1/health
