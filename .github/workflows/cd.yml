name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  ACR_REGISTRY: crpi-srn5bw1mnm0ifd8o.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: vegetbird
  BACKEND_IMAGE: virtual-pal-backend
  FRONTEND_IMAGE: virtual-pal-frontend
  DEPLOY_DIR: /opt/virtual-pal

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # ── 1. 构建镜像 & 推送到 ACR ──
      - name: Build and push images to ACR
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" | docker login --username="$ACR_USERNAME" ${{ env.ACR_REGISTRY }} --password-stdin

          BACKEND_TAG="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE }}"
          FRONTEND_TAG="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}"

          docker build -t $BACKEND_TAG:${{ github.sha }} ./backend
          docker tag $BACKEND_TAG:${{ github.sha }} $BACKEND_TAG:latest
          docker push $BACKEND_TAG:${{ github.sha }}
          docker push $BACKEND_TAG:latest

          docker build -t $FRONTEND_TAG:${{ github.sha }} ./frontend
          docker tag $FRONTEND_TAG:${{ github.sha }} $FRONTEND_TAG:latest
          docker push $FRONTEND_TAG:${{ github.sha }}
          docker push $FRONTEND_TAG:latest

      # ── 2. 服务器部署 ──
      - name: Deploy on server
        run: |
          # 配置 SSH 密钥
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/id_deploy"
          SSH_DEST="root@${{ secrets.SERVER_HOST }}"

          # 创建部署目录
          ssh $SSH_OPTS $SSH_DEST "mkdir -p ${{ env.DEPLOY_DIR }}"

          # 替换 compose 文件中的镜像地址并传送到服务器
          # （现在镜像地址已写死，不需要替换占位符了）
          cat docker-compose.deploy.yml | \
            ssh $SSH_OPTS $SSH_DEST "cat > ${{ env.DEPLOY_DIR }}/docker-compose.yml"

          # 登录 ACR、拉取镜像、重启
          ssh $SSH_OPTS $SSH_DEST "
            echo '${{ secrets.ACR_PASSWORD }}' | docker login --username='${{ secrets.ACR_USERNAME }}' ${{ env.ACR_REGISTRY }} --password-stdin
            cd ${{ env.DEPLOY_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f
          "

      # ── 3. 健康检查 ──
      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.SERVER_HOST }}/api/v1/health
