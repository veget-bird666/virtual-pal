name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────
  # Backend: lint → test → docker build
  # ──────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint with Ruff
        run: ruff check app/ tests/

      - name: Test with pytest
        run: pytest -v

      - name: Build Docker image
        run: docker build -t virtual-pal-backend .

  # ──────────────────────────────
  # Frontend: type-check → build → docker build
  # ──────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Build Docker image
        run: docker build -t virtual-pal-frontend .

  # ──────────────────────────────
  # Integration: 全栈冒烟测试
  # ──────────────────────────────
  integration:
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build

      - name: Start all services
        run: docker compose up -d

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:8000/api/v1/health && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          curl -f http://localhost:8000/api/v1/health
          echo ""
          curl -f http://localhost:80 | head -5

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
